<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trust Intelligence System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">

    <style>
        /* ===== BODY ===== */
        body {
            font-family: 'Roboto Mono', monospace;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #fff;
        }

        h2, h4 {
            text-shadow: 0 0 10px #00f, 0 0 20px #0ff;
        }

        /* ===== GLASS CARDS ===== */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px) saturate(180%);
            -webkit-backdrop-filter: blur(15px) saturate(180%);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 20px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-card:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px #0ff, 0 0 60px #00f;
        }

        /* ===== SCORES ===== */
        #score, #risk {
            font-weight: 700;
            color: #0ff;
            text-shadow: 0 0 15px #0ff;
            transition: all 0.5s ease;
        }

        #status {
            font-weight: bold;
            color: #ff0;
            text-shadow: 0 0 10px #ff0;
        }

        /* ===== ALERTS ===== */
        #alerts div {
            background: rgba(255, 0, 0, 0.1);
            padding: 8px 12px;
            margin: 5px 0;
            border-radius: 12px;
            animation: pop 0.4s ease;
        }

        @keyframes pop {
            0% { transform: scale(0.7); opacity: 0; }
            70% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); }
        }

        /* ===== APP CARDS ===== */
        .app-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 15px;
            padding: 15px;
            margin: 10px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #0ff;
            font-weight: 600;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .app-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 25px #0ff;
        }

        /* ===== SYSTEM ACTION ===== */
        #action {
            font-weight: bold;
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid #0ff;
            border-radius: 12px;
            color: #0ff;
        }

        /* ===== AI CHAT ===== */
        input#question {
            background: rgba(0,0,0,0.2);
            color: #0ff;
            border: 1px solid #0ff;
            border-radius: 12px;
        }

        button {
            font-weight: bold;
        }

        #answer {
            color: #0ff;
            text-shadow: 0 0 10px #0ff;
        }
    </style>
</head>

<body>

<div class="container py-4">

    <!-- 🔵 TITLE -->
    <h2 class="text-center mb-4">🧠 Trust Intelligence System</h2>

    <!-- 🟢 TRUST + RISK -->
    <div class="glass-card text-center mb-4">
        <h4>Trust Score</h4>
        <h1 id="score">0</h1>

        <h5 class="mt-3">Risk Score</h5>
        <h2 id="risk">0%</h2>

        <p>Status: <span id="status">Checking...</span></p>
    </div>

    <!-- ⚠️ ALERTS -->
    <div class="mb-4 glass-card">
        <h4>⚠️ Alerts</h4>
        <div id="alerts"></div>
    </div>

    <!-- 🧠 AI EXPLANATION -->
    <div class="mb-4 glass-card">
        <h4>🧠 AI Explanation</h4>
        <ul id="reasons" class="list-group list-group-flush"></ul>
    </div>

    <!-- ⚡ SYSTEM ACTION -->
    <div class="mb-4 glass-card">
        <h4>⚡ System Action</h4>
        <div id="action">Waiting...</div>
    </div>

    <!-- 📱 ACTIVE APPS -->
    <div class="mb-4 glass-card">
        <h4>📱 Active Permissions</h4>
        <div id="apps" class="row d-flex flex-wrap justify-content-center"></div>
    </div>

    <!-- 🎭 SIMULATION -->
    <div class="text-center mb-4">
        <button class="btn btn-danger m-2" onclick="simulate()">🎭 Run Attack Simulation</button>
        <button class="btn btn-success m-2" onclick="resetSystem()">♻️ Reset</button>
    </div>

    <!-- 🤖 AI CHAT -->
    <div class="glass-card">
        <h4>🤖 AI Assistant</h4>
        <input id="question" class="form-control mb-2" placeholder="Ask something..." />
        <button class="btn btn-light" onclick="askAI()">Ask</button>
        <p id="answer" class="mt-2"></p>
    </div>

</div>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
